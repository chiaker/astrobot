global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: astrobot
    static_configs:
      - targets:
          - app:8000
    metrics_path: /metrics

  # Host server resources (CPU, RAM, disk, network, load)
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  # Per-container resources (cAdvisor)
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
