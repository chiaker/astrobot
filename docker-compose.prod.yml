services:
  migrate:
    image: ${IMAGE_NAME:-astrobot}:${IMAGE_TAG:-latest}
    build: null
    volumes: []

  app:
    image: ${IMAGE_NAME:-astrobot}:${IMAGE_TAG:-latest}
    build: null
    command: ["python", "-m", "astrobot.main", "--mode=webhook"]
    volumes: []
    expose:
      - "8000"
    # Readiness gate for zero-downtime deploys: docker-rollout waits for this to
    # report healthy on the NEW container before it drains and removes the old
    # one. /health checks DB + Redis, so a container that can't actually serve
    # never gets promoted. unless-stopped never restarts on "unhealthy" (only on
    # exit), so a transient dep blip won't bounce a live container.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Grafana on its OWN subdomain (GRAFANA_DOMAIN) behind Caddy — serving at the
  # domain root avoids the serve_from_sub_path auth-endpoint bug. Caddy reaches
  # it over the internal compose network; the loopback host-port binding stays.
  grafana:
    environment:
      GF_SERVER_ROOT_URL: "https://${GRAFANA_DOMAIN:-grafana.localhost}/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    environment:
      BOT_DOMAIN: ${BOT_DOMAIN}
      # Subdomain for Grafana, e.g. grafana.astrobot.dns.army. Default
      # grafana.localhost is harmless (Caddy internal cert, no public ACME) when
      # unset, so the bot's site never breaks.
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN:-grafana.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
