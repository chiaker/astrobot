services:
  migrate:
    image: ${IMAGE_NAME:-astrobot}:${IMAGE_TAG:-latest}
    build: null
    volumes: []

  app:
    image: ${IMAGE_NAME:-astrobot}:${IMAGE_TAG:-latest}
    build: null
    command: ["python", "-m", "astrobot.main", "--mode=webhook"]
    volumes: []
    ports: []
    expose:
      - "8000"

  # Serve Grafana behind Caddy under https://<domain>/grafana/ instead of the
  # raw :3000 port (which firewalls/networks often block). Caddy reaches it over
  # the internal compose network, so the loopback-only port binding is enough.
  grafana:
    environment:
      GF_SERVER_ROOT_URL: "https://${BOT_DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    environment:
      BOT_DOMAIN: ${BOT_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
