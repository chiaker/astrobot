# Shared log rotation so container logs can't fill the disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: astrobot
      POSTGRES_PASSWORD: astrobot
      POSTGRES_DB: astrobot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrobot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    logging: *default-logging
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    # Bind to loopback only: not reachable from the internet directly. Access is
    # via Caddy (https://<domain>/grafana/) on the compose network, or an SSH
    # tunnel to the host. Local dev still works on http://localhost:3000.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

  # Host-level resources: CPU, RAM, disk, network, load average.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    logging: *default-logging
    pid: host
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave

  # Per-container resources: CPU / memory / network for app, postgres, redis…
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    logging: *default-logging
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: astrobot
      POSTGRES_USER: astrobot
      POSTGRES_PASSWORD: astrobot
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "3"
      HEALTHCHECK_PORT: "8080"
    volumes:
      - ./backups:/backups

  migrate:
    build: .
    env_file: .env
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  app:
    build: .
    env_file: .env
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./alembic.ini:/app/alembic.ini
    # No host port here: in prod the app is scaled to two replicas during a
    # docker-rollout swap, and two containers can't publish the same host port.
    # Caddy reaches it over the compose network via `expose: 8000`. Local dev
    # gets the 8000:8000 mapping from docker-compose.override.yml (auto-loaded).
    expose:
      - "8000"
    restart: unless-stopped
    command: ["python", "-m", "astrobot.main"]

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:
