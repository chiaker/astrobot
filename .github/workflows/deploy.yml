name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.image.outputs.name }}:latest
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE_NAME,IMAGE_TAG
          # A cold pull of the ~750MB deps layer (after a dep/Dockerfile change) can
          # exceed the 10m default over the server's slow ghcr link — give it room.
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /opt/astrobot
            git fetch --quiet origin main
            git reset --hard origin/main
            export IMAGE_NAME="${{ steps.image.outputs.name }}"
            export IMAGE_TAG="${{ needs.build.outputs.tag }}"
            # Drive compose-file selection via env so every `docker compose` AND
            # the docker-rollout plugin (which shells out to `docker compose`)
            # pick up both files — no per-version `-f` flag quirks.
            export COMPOSE_FILE="docker-compose.yml:docker-compose.prod.yml"

            # Install/refresh the docker-rollout CLI plugin every deploy. A stale
            # cached version can miss newer behaviour, so always pull latest;
            # download to a temp file and swap atomically so a network blip can't
            # leave a half-written plugin. If the download fails, keep the
            # existing one (deploy still works via COMPOSE_FILE, no `-f` needed).
            mkdir -p "$HOME/.docker/cli-plugins"
            if curl -fsSL https://raw.githubusercontent.com/wowu/docker-rollout/master/docker-rollout \
                 -o "$HOME/.docker/cli-plugins/docker-rollout.tmp"; then
              chmod +x "$HOME/.docker/cli-plugins/docker-rollout.tmp"
              mv "$HOME/.docker/cli-plugins/docker-rollout.tmp" "$HOME/.docker/cli-plugins/docker-rollout"
            fi

            # Pull the freshly built image (already on ghcr.io — no build here).
            docker compose pull app migrate app-max migrate-max

            # Run migrations to completion BEFORE swapping app. Keep these
            # backward-compatible (expand/contract) so the old container keeps
            # working during the brief two-replica overlap. set -e fails the
            # deploy if a migration errors.
            docker compose run --rm migrate
            docker compose run --rm migrate-max

            # Ensure infra + ingress are up without disturbing them. --no-recreate
            # leaves the running app and (crucially) the Caddy ingress untouched;
            # --scale migrate=0 stops `up` from spawning a second migrate run.
            docker compose up -d --no-recreate --scale migrate=0 --scale migrate-max=0

            # Zero-downtime swap of the bot: start a new app replica, wait for its
            # healthcheck, then drain and remove the old one. Caddy load-balances
            # across both via DNS during the overlap. No `-f` — COMPOSE_FILE drives
            # file selection, which every docker-rollout version honours.
            docker rollout app
            # MAX bot: same zero-downtime swap. It self-subscribes its webhook on
            # startup (idempotent, same URL), so no separate set-webhook step.
            docker rollout app-max

            # Re-assert the Telegram webhook AFTER the old container is gone. The
            # webhook is otherwise managed by each container's startup, which races
            # with the dying old container during a rollout and can leave the bot
            # with no webhook (admin + outbound sends still work, but commands and
            # inline buttons go dead until a manual restart). This explicit step
            # runs inside the freshly-promoted container — with the right token,
            # secret and URL from its env — so the live URL is always registered.
            # set -e fails the deploy loudly if the webhook can't be set.
            docker compose exec -T app python -m astrobot.main --set-webhook

            # Mounted config files (prometheus.yml scrape targets, Caddyfile routes)
            # don't trigger a recreate, so reload them explicitly. caddy reload is
            # zero-downtime; the `|| true` keeps deploy green if the binary/path
            # differs across caddy versions.
            docker compose restart prometheus
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile || true

            # Remove ALL images not used by a running/created container, not just
            # dangling ones — old :<short_sha> tags accumulate otherwise and fill
            # /var/lib/docker/overlay2. Rollbacks re-pull from the registry.
            docker image prune -af
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
