name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.image.outputs.name }}:latest
          build-args: |
            GIT_SHA=${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo ${IMAGE_NAME} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE_NAME,IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/astrobot
            git fetch --quiet origin main
            git reset --hard origin/main
            export IMAGE_NAME="${{ steps.image.outputs.name }}"
            export IMAGE_TAG="${{ needs.build.outputs.tag }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app migrate
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f --filter "until=72h"
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
